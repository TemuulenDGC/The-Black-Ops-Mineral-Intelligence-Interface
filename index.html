<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MON-INTEL STRATEGIC GRID v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; padding: 40px; pointer-events: none; width: 100%; box-sizing: border-box; }
        .glitch-title { color: #fff; font-size: 2.5rem; letter-spacing: 15px; text-transform: uppercase; margin: 0; font-weight: 900; border-left: 5px solid #00f2ff; padding-left: 20px; }
        .data-readout { position: absolute; bottom: 40px; right: 40px; width: 350px; background: rgba(0,20,30,0.8); border: 1px solid #00f2ff; padding: 20px; color: #00f2ff; backdrop-filter: blur(10px); display: none; pointer-events: auto; }
        .data-readout.active { display: block; }
        .loading-bar { width: 200px; height: 2px; background: #111; margin-top: 10px; overflow: hidden; }
        .loading-progress { width: 40%; height: 100%; background: #00f2ff; animation: load 2s infinite; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
    </style>
</head>
<body>
    <div id="ui">
        <h1 class="glitch-title">MON-INTEL <span style="color: #00f2ff">MAX</span></h1>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>
    <div id="data-readout" class="data-readout">
        <h2 id="r-name">---</h2>
        <p><strong>GEOLOGY:</strong> <span id="r-type">---</span></p>
        <p><strong>RESERVE:</strong> <span id="r-res">---</span></p>
        <p><strong>RGI SCORE:</strong> <span id="r-gov">---</span></p>
        <button onclick="this.parentElement.classList.remove('active')" style="background:none; border:1px solid #00f2ff; color:#00f2ff; width:100%; padding:10px; cursor:pointer;">DISMISS</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- THE "ENVIRONMENT" ---
        // Dark reflective floor for a "Command Center" feel
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x050505, shininess: 100 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI/2;
        floor.position.y = -2;
        scene.add(floor);

        // --- THE "MAP" (Wireframe Topography) ---
        const mapGeo = new THREE.PlaneGeometry(20, 12, 100, 100);
        const pos = mapGeo.attributes.position;
        for(let i=0; i<pos.count; i++) {
            let x = pos.getX(i);
            let y = pos.getY(i);
            // Procedural Mountains (Altai/Khangai)
            let z = Math.sin(x * 0.3) * Math.cos(y * 0.3) * 0.8;
            if (x < -3) z += Math.random() * 0.5; // Rough Altai
            pos.setZ(i, z);
        }
        const mapMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.1 });
        const map = new THREE.Mesh(mapGeo, mapMat);
        map.rotation.x = -Math.PI/2.5;
        scene.add(map);

        // --- CORE ASSETS (Volumetric Ore) ---
        const siteData = [
            { name: "Oyu Tolgoi", type: "Porphyry Cu-Au", res: "42Mt Cu", gov: "61/100", pos: [-3, 0, 1], color: 0x00f2ff },
            { name: "Erdenet", type: "Copper-Moly", res: "1.7Mt Cu", gov: "44/100", pos: [0, 2, 0.5], color: 0x00ff99 }
        ];

        const interactables = [];
        siteData.forEach(site => {
            const group = new THREE.Group();
            
            // The "Ore Body" - Pulsing crystalline structure
            const oreGeo = new THREE.IcosahedronGeometry(0.3, 1);
            const oreMat = new THREE.MeshPhongMaterial({ color: site.color, emissive: site.color, wireframe: true });
            const ore = new THREE.Mesh(oreGeo, oreMat);
            group.add(ore);

            // The "Uplink Beam"
            const beamGeo = new THREE.CylinderGeometry(0.01, 0.01, 10);
            const beamMat = new THREE.MeshBasicMaterial({ color: site.color, transparent: true, opacity: 0.2 });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            group.add(beam);

            group.position.set(site.pos[0], site.pos[2], site.pos[1]);
            group.userData = site;
            scene.add(group);
            interactables.push(ore);
        });

        // --- LIGHTING & CAMERA ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambient);
        const point = new THREE.PointLight(0x00f2ff, 1, 100);
        point.position.set(5, 5, 5);
        scene.add(point);

        camera.position.set(0, 5, 12);
        camera.lookAt(0,0,0);

        // --- INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactables);
            if(intersects.length > 0) {
                const data = intersects[0].object.parent.userData;
                document.getElementById('r-name').innerText = data.name;
                document.getElementById('r-type').innerText = data.type;
                document.getElementById('r-res').innerText = data.res;
                document.getElementById('r-gov').innerText = data.gov;
                document.getElementById('data-readout').classList.add('active');
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            map.rotation.z += 0.001;
            interactables.forEach(m => {
                m.rotation.y += 0.01;
                m.scale.setScalar(1 + Math.sin(Date.now()*0.003)*0.1);
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
