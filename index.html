<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MON-INTEL | STRATEGIC RESOURCE GRID v4.MAX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --warn: #ff3333; --bg: #000405; --panel: rgba(0, 15, 20, 0.9); }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; overflow: hidden; }
        
        /* HUD LAYER */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 100; border: 1px solid rgba(0, 242, 255, 0.1); }
        #header { position: absolute; top: 40px; left: 40px; }
        #header h1 { margin: 0; font-size: 2.2rem; letter-spacing: 12px; font-weight: 900; filter: drop-shadow(0 0 15px var(--neon)); }
        
        /* GOVERNANCE RADAR (Real Data from RGI 2021) */
        #gov-dash { position: absolute; bottom: 40px; left: 40px; width: 300px; background: var(--panel); border: 1px solid var(--neon); padding: 15px; pointer-events: auto; }
        .gov-item { margin: 10px 0; font-size: 0.7rem; }
        .bar-bg { width: 100%; height: 6px; background: #111; margin-top: 4px; border: 1px solid rgba(0,242,255,0.2); }
        .bar-fill { height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* RESOURCE INTEL */
        #intel { position: absolute; top: 120px; right: -400px; width: 340px; background: var(--panel); border: 1px solid var(--neon); padding: 25px; transition: 0.5s; pointer-events: auto; backdrop-filter: blur(15px); }
        #intel.active { right: 40px; }
        .data-val { color: #fff; font-size: 1.1rem; margin-bottom: 15px; border-bottom: 1px solid rgba(0,242,255,0.2); }

        #scan { position: absolute; top: 0; height: 100%; width: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,242,255,0.03) 1px, rgba(0,242,255,0.03) 2px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="scan"></div>
        <div id="header">
            <h1>MON-INTEL <span style="color:#fff">V4</span></h1>
            <div style="font-size: 0.6rem; letter-spacing: 5px;">NATIONAL MINERAL INTELLIGENCE INTERFACE</div>
        </div>

        <div id="gov-dash">
            <div style="font-weight: bold; border-bottom: 1px solid var(--neon); margin-bottom: 10px;">RGI GOVERNANCE (LAW/PRACTICE)</div>
            <div class="gov-item">LICENSING <span style="float:right">50 | 68</span><div class="bar-bg"><div class="bar-fill" style="width: 68%"></div></div></div>
            <div class="gov-item">SOEs <span style="float:right">64 | 36</span><div class="bar-bg"><div class="bar-fill" style="width: 36%; background:#ff3333;"></div></div></div>
            <div class="gov-item">SWF (FUTURE HERITAGE) <span style="float:right">92 | 81</span><div class="bar-bg"><div class="bar-fill" style="width: 81%"></div></div></div>
        </div>

        <div id="intel">
            <div style="text-align: right;"><button onclick="closeIntel()" style="background:none; border:1px solid #ff3333; color:#ff3333; cursor:pointer;">[EXIT]</button></div>
            <div style="font-size: 0.6rem; color: rgba(0,242,255,0.5);">PROJECT ID</div>
            <div class="data-val" id="d-name">--</div>
            <div style="font-size: 0.6rem; color: rgba(0,242,255,0.5);">ORE BODY TYPE</div>
            <div class="data-val" id="d-type">--</div>
            <div style="font-size: 0.6rem; color: rgba(0,242,255,0.5);">RESOURCE ESTIMATE</div>
            <div class="data-val" id="d-res">--</div>
            <div style="font-size: 0.6rem; color: rgba(0,242,255,0.5);">SITE COORDINATES</div>
            <div class="data-val" id="d-coord">--</div>
        </div>
    </div>

    <script>
        // --- REAL GEOSPATIAL DATASET ---
        const sites = [
            { name: "Oyu Tolgoi (Hugo North)", type: "Porphyry Cu-Au (12km Trend)", res: "42Mt Cu / 1.8kt Au", pos: [106.8, 43.0], color: 0x00f2ff, scale: [0.3, 1.2, 0.3], rot: [0.5, 0, 0] },
            { name: "Tavan Tolgoi", type: "Coking Coal (Tsankhi)", res: "6.4B Tonnes", pos: [105.4, 43.6], color: 0x555555, scale: [0.8, 0.2, 0.8], rot: [0, 0, 0] },
            { name: "Erdenet", type: "Cu-Mo Intrusive", res: "1.72Mt Cu", pos: [104.0, 49.0], color: 0x00ffaa, scale: [0.5, 0.5, 0.5], rot: [0, 0, 0] },
            { name: "Dornod", type: "Uranium (In-Situ)", res: "28kt Uranium", pos: [114.5, 48.4], color: 0xccff00, scale: [0.2, 0.8, 0.2], rot: [0.8, 0, 0] },
            { name: "Khotgor", type: "Rare Earths / Coal", res: "Strategic REE Reserve", pos: [91.6, 49.6], color: 0xff00ff, scale: [0.4, 0.4, 0.4], rot: [0, 0, 0] },
            { name: "Tsagaan Suvarga", type: "Porphyry Cu-Mo", res: "1.6Mt Copper", pos: [108.3, 44.4], color: 0x00ccff, scale: [0.3, 0.6, 0.3], rot: [0.3, 0, 0] },
            { name: "Baganuur", type: "Thermal Coal", res: "700Mt Reserve", pos: [108.3, 47.7], color: 0x333333, scale: [0.7, 0.1, 0.7], rot: [0, 0, 0] }
        ];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- THE "MONGOLIA" TOPOGRAPHICAL GRID ---
        const mapGroup = new THREE.Group();
        const mapGeo = new THREE.PlaneGeometry(24, 14, 100, 60);
        const posAttr = mapGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const y = posAttr.getY(i);
            // Simulate Altai (West) and Khangai (North) mountains
            let z = 0;
            if (x < -2) z += (Math.abs(x)-2) * 0.4 + Math.random()*0.2; // Altai
            if (y > 2) z += (y-2) * 0.2; // Khangai
            posAttr.setZ(i, z);
        }
        mapGeo.computeVertexNormals();

        const map = new THREE.Mesh(mapGeo, new THREE.MeshPhongMaterial({ 
            color: 0x00151a, wireframe: true, transparent: true, opacity: 0.25, side: THREE.DoubleSide 
        }));
        mapGroup.add(map);
        mapGroup.rotation.x = -Math.PI / 2.5;
        scene.add(mapGroup);

        // --- VOLUMETRIC ORE BODIES ---
        const interactables = [];
        sites.forEach(s => {
            const group = new THREE.Group();
            
            // The "Voxel" Body
            const oreGeo = new THREE.BoxGeometry(1, 1, 1);
            const oreMat = new THREE.MeshStandardMaterial({ 
                color: s.color, emissive: s.color, emissiveIntensity: 0.5, wireframe: true, transparent: true, opacity: 0.4 
            });
            const ore = new THREE.Mesh(oreGeo, oreMat);
            ore.scale.set(s.scale[0], s.scale[1], s.scale[2]);
            ore.rotation.set(s.rot[0], s.rot[1], s.rot[2]);
            group.add(ore);

            // Position mapping
            const mapX = (s.pos[0] - 103) * 0.8;
            const mapY = (s.pos[1] - 46.5) * 1.0;
            group.position.set(mapX, mapY, 0.5);
            group.userData = s;

            mapGroup.add(group);
            interactables.push(ore);
        });

        // LIGHTS
        const pLight = new THREE.PointLight(0x00f2ff, 1.5, 100);
        pLight.position.set(0, 5, 10);
        scene.add(pLight);
        scene.add(new THREE.AmbientLight(0x111111));

        camera.position.set(0, 10, 15);
        camera.lookAt(0, 0, 0);

        // --- INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(interactables);
            if(hits.length > 0) {
                const data = hits[0].object.parent.userData;
                document.getElementById('d-name').innerText = data.name;
                document.getElementById('d-type').innerText = data.type;
                document.getElementById('d-res').innerText = data.res;
                document.getElementById('d-coord').innerText = `${data.pos[0]}N, ${data.pos[1]}E`;
                document.getElementById('intel').classList.add('active');
            }
        });

        function closeIntel() { document.getElementById('intel').classList.remove('active'); }

        function animate() {
            requestAnimationFrame(animate);
            mapGroup.rotation.z += 0.0005;
            interactables.forEach(m => {
                m.rotation.y += 0.01;
                m.scale.multiplyScalar(1 + Math.sin(Date.now()*0.002)*0.001);
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
